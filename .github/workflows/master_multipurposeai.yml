# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - MultipurposeAi

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: npm install, build, lint, and test
        run: |
          npm ci
          npm run lint --if-present
          npm run build --if-present
          npm run test --if-present
        env:
          GOOGLE_CLIENT_ID: ci-dummy-google-client-id.apps.googleusercontent.com
          GOOGLE_CLIENT_SECRET: ci-dummy-google-client-secret
          DATABASE_URL: mongodb://127.0.0.1:27017/ci-build
          NEXTAUTH_SECRET: ci-nextauth-secret-please-change
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EDBA9E2BD77C4D58BE00386935870AA4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CFB39097D4EA46EEB96ACD5BABF14668 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5512DEF83DCC47C6A4E5494F6AFDBACC }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'MultipurposeAi'
          slot-name: 'Production'
          package: .
          
